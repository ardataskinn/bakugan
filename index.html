<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BAKUARENA — Bakugan Kataloğu</title>
  <meta name="description" content="Savaşçılar, bakuganlar, açık/kapalı formlar, attribute varyantları ve süper güçler." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Saira+Condensed:wght@500;600;700&family=Saira:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="arena-bg" aria-hidden="true">
    <div class="arena-hex"></div>
    <div class="arena-glow arena-glow-a"></div>
    <div class="arena-glow arena-glow-b"></div>
    <div class="arena-scan"></div>
  </div>

  <header class="topbar">
    <a class="brand" href="#savascilar">
      <span class="brand-sphere" aria-hidden="true"></span>
      <span class="brand-text">BAKUARENA</span>
    </a>
    <nav class="nav" aria-label="Ana menü">
      <a href="#savascilar">Savaşçılar</a>
      <a href="#katalog">Bakuganlar</a>
    </nav>
    <button type="button" class="menu-toggle" id="menuToggle" aria-label="Menüyü aç">
      <span></span><span></span>
    </button>
  </header>

  <main id="top">
    <section class="section warriors section-first" id="savascilar">
      <div class="section-head">
        <p class="eyebrow">Katalog</p>
        <h2>Savaşçılar</h2>
        <p class="section-lead">Battle Brawlers’dan Mechtanium Surge’e tüm ana savaşçılar.</p>
      </div>
      <div class="warrior-filters" id="warriorSeasonFilters"></div>
      <div class="warrior-rail" id="warriorRail"></div>
    </section>

    <section class="section catalog" id="katalog">
      <div class="section-head">
        <p class="eyebrow">Küresel arşiv</p>
        <h2>Bakuganlar</h2>
        <p class="section-lead">Açık / kapalı form, element varyantları, G-Power, özellikler ve süper güçler.</p>
      </div>

      <div class="catalog-toolbar">
        <div class="season-tabs" id="seasonTabs" role="tablist" aria-label="Sezon filtre"></div>
        <label class="search-field">
          <span class="sr-only">Bakugan ara</span>
          <input type="search" id="searchInput" placeholder="İsim, partner, element…" autocomplete="off" />
        </label>
        <div class="attr-filters" id="attrFilters"></div>
      </div>

      <div class="catalog-layout">
        <div class="baku-grid" id="bakuGrid"></div>
        <aside class="detail" id="detailPanel" aria-live="polite">
          <div class="detail-empty" id="detailEmpty">
            <div class="empty-sphere" aria-hidden="true"></div>
            <p>Bir bakugan seç — küreyi aç, güçleri oku.</p>
          </div>
          <div class="detail-body is-hidden" id="detailBody"></div>
        </aside>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p><a href="https://github.com/ardataskinn" target="_blank" rel="noopener">github.com/ardataskinn</a></p>
  </footer>

  <script src="data.js?v=6"></script>
  <script src="app.js?v=6"></script>
</body>
</html>
